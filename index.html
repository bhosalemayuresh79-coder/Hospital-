<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aya Hospital — Login</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet" />

  <!-- Shared CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <!-- ================================================
       LOGIN CARD
  ================================================ -->
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon">🏥</div>
      <h2>Aya Hospital</h2>
      <p>Aapki Seva Yahi Humara Kartavya</p>
    </div>

    <!-- Email Field — id="email" -->
    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        class="form-control"
        placeholder="you@example.com"
        autocomplete="email"
      />
    </div>

    <!-- Name Field — id="name" -->
    <div class="form-group">
      <label for="name">Your Name</label>
      <input
        type="text"
        id="name"
        class="form-control"
        placeholder="Full Name"
        autocomplete="name"
      />
    </div>

    <!-- Password Field — id="password" -->
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <!-- Login Button — id="loginBtn" zaroori hai -->
    <button
      id="loginBtn"
      class="btn-primary mt-2"
      onclick="doLogin()">
      Login →
    </button>

    <!-- Register Link -->
    <p class="text-center mt-2" style="font-size:0.82rem;">
      Naya account?
      <a href="#"
        onclick="doRegister()"
        style="color:var(--blue);font-weight:600;text-decoration:none;">
        Register karo
      </a>
    </p>

    <!-- Terms -->
    <p class="text-muted text-center mt-1" style="font-size:0.72rem;">
      Login karke aap hamare Terms aur Privacy Policy se agree karte hain.
    </p>

    <!-- Bootstrap Alert yahan inject hoga (auth.js karegi) -->

  </div><!-- /login-card -->

  <!-- ================================================
       SCRIPTS — Order bahut zaroori hai
  ================================================ -->

  <!-- 1. Bootstrap JS — pehle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- 2. Firebase Config — Auth initialize hoga -->
  <script type="module" src="firebase-config.js"></script>

  <!-- 3. Auth JS — Login/Register logic -->
  <script type="module" src="auth.js"></script>

</body>
</html>
